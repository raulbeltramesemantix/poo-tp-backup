<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#222"/>
    </marker>
    <marker id="triangle" markerWidth="18" markerHeight="14" refX="17" refY="7" orient="auto">
      <path d="M1,1 L17,7 L1,13 Z" fill="white" stroke="#222" stroke-width="1.6"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="14" refX="1" refY="7" orient="auto">
      <path d="M1,7 L9,1 L17,7 L9,13 Z" fill="white" stroke="#222" stroke-width="1.6"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111; }
      .classbox { fill: #fff; stroke: #222; stroke-width: 2; }
      .header { fill: #eef3f8; stroke: #222; stroke-width: 2; }
      .abstract { fill: #f7f0df; stroke: #222; stroke-width: 2; }
      .note { fill: #fff8d6; stroke: #8a6d00; stroke-width: 1.6; }
      .name { font: 700 18px Arial, sans-serif; fill: #111; }
      .interface { font: 13px Arial, sans-serif; fill: #333; font-style: italic; }
      .text { font: 15px Arial, sans-serif; fill: #111; }
      .small { font: 13px Arial, sans-serif; fill: #333; }
      .line { stroke: #222; stroke-width: 1.8; fill: none; }
      .dash { stroke-dasharray: 8 6; }
      .label { font: 13px Arial, sans-serif; fill: #222; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#ffffff"/>
  <text x="800" y="45" text-anchor="middle" class="title">Diagrama de classes - Decorator para itens do pedido</text>

  <g id="itemcardapio">
    <rect x="590" y="90" width="360" height="165" class="classbox"/>
    <rect x="590" y="90" width="360" height="55" class="header"/>
    <text x="770" y="112" text-anchor="middle" class="interface">&lt;&lt;interface&gt;&gt;</text>
    <text x="770" y="135" text-anchor="middle" class="name">ItemCardapio</text>
    <line x1="590" y1="145" x2="950" y2="145" class="line"/>
    <text x="612" y="177" class="text">+ getNome() : String</text>
    <text x="612" y="207" class="text">+ getDescricao() : String</text>
    <text x="612" y="237" class="text">+ calcularValor() : double</text>
  </g>

  <g id="descricao">
    <rect x="70" y="330" width="350" height="165" class="classbox"/>
    <rect x="70" y="330" width="350" height="45" class="header"/>
    <text x="245" y="360" text-anchor="middle" class="name">DescricaoProduto</text>
    <line x1="70" y1="375" x2="420" y2="375" class="line"/>
    <text x="92" y="405" class="text">- idDescricao : int</text>
    <text x="92" y="432" class="text">- descricaoDetalhada : String</text>
    <text x="92" y="459" class="text">- valor : double</text>
    <line x1="70" y1="474" x2="420" y2="474" class="line"/>
    <text x="92" y="489" class="text">+ getValor() : double</text>
  </g>

  <g id="produto">
    <rect x="500" y="300" width="360" height="225" class="classbox"/>
    <rect x="500" y="300" width="360" height="45" class="header"/>
    <text x="680" y="330" text-anchor="middle" class="name">Produto</text>
    <line x1="500" y1="345" x2="860" y2="345" class="line"/>
    <text x="522" y="374" class="text">- idProduto : int</text>
    <text x="522" y="401" class="text">- nome : String</text>
    <text x="522" y="428" class="text">- ativo : boolean</text>
    <text x="522" y="455" class="text">- descricaoProduto : DescricaoProduto</text>
    <line x1="500" y1="475" x2="860" y2="475" class="line"/>
    <text x="522" y="503" class="text">+ calcularValor() : double</text>
  </g>

  <g id="decorator">
    <rect x="1030" y="295" width="440" height="230" class="classbox"/>
    <rect x="1030" y="295" width="440" height="45" class="abstract"/>
    <text x="1250" y="325" text-anchor="middle" class="name">ItemCardapioDecorator</text>
    <line x1="1030" y1="340" x2="1470" y2="340" class="line"/>
    <text x="1052" y="370" class="text"># itemDecorado : ItemCardapio</text>
    <line x1="1030" y1="392" x2="1470" y2="392" class="line"/>
    <text x="1052" y="420" class="text">+ ItemCardapioDecorator(itemDecorado)</text>
    <text x="1052" y="447" class="text">+ getNome() : String</text>
    <text x="1052" y="474" class="text">+ getDescricao() : String</text>
    <text x="1052" y="501" class="text">+ calcularValor() : double</text>
  </g>

  <g id="itempedido">
    <rect x="455" y="645" width="410" height="225" class="classbox"/>
    <rect x="455" y="645" width="410" height="45" class="header"/>
    <text x="660" y="675" text-anchor="middle" class="name">ItemPedido</text>
    <line x1="455" y1="690" x2="865" y2="690" class="line"/>
    <text x="477" y="719" class="text">- quantidade : int</text>
    <text x="477" y="746" class="text">- subtotal : double</text>
    <text x="477" y="773" class="text">- produto : Produto</text>
    <text x="477" y="800" class="text">- adicionais : List&lt;Adicional&gt;</text>
    <line x1="455" y1="820" x2="865" y2="820" class="line"/>
    <text x="477" y="848" class="text">+ calcularSubtotal() : double</text>
  </g>

  <g id="adicional">
    <rect x="930" y="670" width="300" height="170" class="classbox"/>
    <rect x="930" y="670" width="300" height="45" class="header"/>
    <text x="1080" y="700" text-anchor="middle" class="name">Adicional</text>
    <line x1="930" y1="715" x2="1230" y2="715" class="line"/>
    <text x="952" y="744" class="text">- idAdicional : int</text>
    <text x="952" y="771" class="text">- nome : String</text>
    <text x="952" y="798" class="text">- valor : double</text>
    <line x1="930" y1="814" x2="1230" y2="814" class="line"/>
    <text x="952" y="832" class="text">+ getValor() : double</text>
  </g>

  <g id="adicionaldecorator">
    <rect x="1245" y="620" width="330" height="230" class="classbox"/>
    <rect x="1245" y="620" width="330" height="45" class="header"/>
    <text x="1410" y="650" text-anchor="middle" class="name">AdicionalDecorator</text>
    <line x1="1245" y1="665" x2="1575" y2="665" class="line"/>
    <text x="1267" y="694" class="text">- adicional : Adicional</text>
    <line x1="1245" y1="716" x2="1575" y2="716" class="line"/>
    <text x="1267" y="744" class="text">+ AdicionalDecorator(...)</text>
    <text x="1267" y="771" class="text">+ getNome() : String</text>
    <text x="1267" y="798" class="text">+ getDescricao() : String</text>
    <text x="1267" y="825" class="text">+ calcularValor() : double</text>
  </g>

  <line x1="680" y1="300" x2="720" y2="255" class="line dash" marker-end="url(#triangle)"/>
  <line x1="1250" y1="295" x2="900" y2="255" class="line dash" marker-end="url(#triangle)"/>
  <line x1="1410" y1="620" x2="1250" y2="525" class="line" marker-end="url(#triangle)"/>

  <line x1="500" y1="412" x2="420" y2="412" class="line" marker-start="url(#diamond)"/>
  <text x="442" y="398" class="label">descricaoProduto</text>

  <path d="M1250 340 C1180 185, 900 182, 820 255" class="line" marker-end="url(#arrow)"/>
  <text x="1070" y="203" class="label">itemDecorado</text>

  <line x1="1245" y1="735" x2="1230" y2="755" class="line" marker-end="url(#arrow)"/>
  <text x="1195" y="729" class="label">adicional</text>

  <line x1="660" y1="645" x2="670" y2="525" class="line" marker-end="url(#arrow)"/>
  <text x="685" y="590" class="label">produto</text>

  <line x1="865" y1="770" x2="930" y2="770" class="line" marker-start="url(#diamond)"/>
  <text x="870" y="756" class="label">0..* adicionais</text>

  <rect x="220" y="910" width="1160" height="95" rx="6" class="note"/>
  <text x="240" y="938" class="small">
    <tspan font-weight="700">Uso previsto:</tspan>
    ItemPedido continua armazenando Produto e List&lt;Adicional&gt; para preservar o JSON atual.
  </text>
  <text x="240" y="965" class="small">
    No calcularSubtotal(), ele monta a cadeia Produto -> AdicionalDecorator -> outros adicionais.
  </text>
  <text x="240" y="992" class="small">
    O subtotal passa a ser itemDecorado.calcularValor() * quantidade.
  </text>
</svg>
